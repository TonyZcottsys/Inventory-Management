# Render Blueprint - deploy database + web app from one place
# Docs: https://render.com/docs/blueprint-spec

services:
  # Next.js web app
  - type: web
    name: stock-management-app
    runtime: node
    region: oregon
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy && npm run build
    startCommand: npm start

    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: inventory-db
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: NEXT_PUBLIC_APP_URL
        sync: false  # Set in Dashboard to https://stock-management-app.onrender.com
      - key: OPENAI_API_KEY
        sync: false

# Render Postgres (managed PostgreSQL)
databases:
  - name: inventory-db
    plan: free
    region: oregon
