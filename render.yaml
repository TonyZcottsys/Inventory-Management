# Render Blueprint - web app only (uses your existing free Postgres)
# Render allows only ONE free database per account. Set DATABASE_URL in the Dashboard
# to your existing free Postgres "Internal Database URL".

services:
  - type: web
    name: stock-management-app
    runtime: node
    region: oregon
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy && npm run build
    startCommand: npm start

    envVars:
      - key: DATABASE_URL
        sync: false  # Paste your existing free Postgres "Internal Database URL" in Dashboard
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: NEXT_PUBLIC_APP_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
