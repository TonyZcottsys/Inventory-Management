# Render Blueprint - deploy database + web app from one place
# Docs: https://render.com/docs/blueprint-spec

services:
  # PostgreSQL database
  - type: pserv
    name: inventory-db
    plan: free
    region: oregon
    ipAllowList: []  # empty = allow all (needed for Render web service to connect)

  # Next.js web app
  - type: web
    name: stock-management-app
    runtime: node
    region: oregon

    # Connect to GitHub/GitLab repo in Render dashboard first, then this file is used
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy && npm run build
    startCommand: npm start

    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: inventory-db
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true  # Render generates a secure secret; set your own in Dashboard if preferred
      - key: NEXT_PUBLIC_APP_URL
        sync: false  # Set manually in Dashboard to your app URL, e.g. https://stock-management-app.onrender.com
      - key: OPENAI_API_KEY
        sync: false  # Set in Dashboard if you use AI features
